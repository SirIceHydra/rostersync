
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RosterSync</title>
    <link rel="icon" type="image/svg+xml" href="/rostersync-favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>

          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'Segoe UI', 'sans-serif'],

              mono: ['JetBrains Mono', 'ui-monospace', 'Menlo', 'monospace'],
            },
            maxWidth: {
              'rs': '1240px',
            },
            colors: {
              /* Brand — maps existing utility names to RosterSync tokens */
              indigo: {
                50: '#F5F1FE',
                100: '#EAE3FA',
                200: '#D4CAED',
                300: '#B8A6E0',
                400: '#9B82D3',
                500: '#7B62D1',
                600: '#5D41B9',
                700: '#4A32A0',
                800: '#3D2985',
                900: '#2F2066',
              },
              slate: {
                50: '#FAF8F5',
                100: '#F2EEE8',
                200: '#E8E2D8',
                300: '#C9C3D6',
                400: '#8A8498',
                500: '#6B6478',
                600: '#5A5468',
                700: '#4A4360',
                800: '#3A3550',
                900: '#2A2140',
              },
              emerald: {
                50: '#E1F4EB',
                100: '#C6E9D8',

                500: '#1F9D67',

                700: '#156B47',

                50: '#FBE3E1',

                300: '#E27B73',
                400: '#D6554F',
                500: '#D6443B',
                600: '#B83730',
                700: '#942C26',

              amber: {
                50: '#FFF8EB',
                100: '#FCF1DD',
                200: '#F8E4BC',

                400: '#E8B555',
                500: '#D98B12',
                600: '#B8740F',
                700: '#8F5C0C',
              },
            },
          },
        },
      };
    </script>
    <style>
        html { color-scheme: light; }
        body { -webkit-tap-highlight-color: transparent; }
        .no-print { display: block; }
        @media print {
            .no-print { display: none !important; }
            body { background: white; font-size: 12pt; }
            .print-only { display: block !important; }
            main { padding: 0 !important; max-width: 100% !important; }
            .shadow-sm, .shadow-lg { box-shadow: none !important; border: 1px solid var(--rs-slate-200) !important; }
        }
        /* Display type: headings that use Tailwind font-black / tight tracking */
        .font-display, .rs-app-heading {
          font-family: var(--rs-font-display);
        }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body class="antialiased font-sans text-slate-900 bg-slate-50">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
